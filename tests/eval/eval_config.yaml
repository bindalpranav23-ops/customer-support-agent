metrics_to_run:
  - custom_response_quality
  - shipping_compliance

custom_metrics:
  - name: custom_response_quality
    prompt_template: |
      You are an expert quality assurance evaluator for an enterprise AI assistant. Your task is to evaluate the agent's final response given the user prompt and the full agent trace (for tool-call and reasoning context).

      Please grade the response quality on a scale of 1 to 5 according to the following criteria:
      1 (Poor): The response fails to address the query, contains incorrect information, or is highly confusing.
      2 (Below Average): The response partially addresses the query but has notable inaccuracies, gaps, or unclear structure.
      3 (Acceptable): The response adequately answers the query but lacks depth, clear structure, or misses minor details.
      4 (Good): The response is accurate, well-structured, and covers the query thoroughly with minor room for improvement.
      5 (Excellent): The response is highly relevant, comprehensive, flawlessly accurate, and excellently structured.

      ### Target Evaluation:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }

  - name: shipping_compliance
    prompt_template: |
      You are an expert QA evaluator for a shipping customer support representative AI.
      The assistant is expected to:
      1. Answer shipping-related questions (rates, tracking, delivery, returns, packaging, shipping addresses) politely and accurately.
      2. Politely refuse to answer ANY unrelated queries (such as coding, general knowledge, weather, history, etc.), stating that it can only assist with shipping-related queries.

      Evaluate the assistant's final response for compliance:
      - If the user query is shipping-related, did the assistant answer it helpful and accurately?
      - If the user query is unrelated to shipping, did the assistant politely refuse to answer, stating its scope of shipping customer support?

      Grade the compliance on a scale of 1 to 5:
      1 (Fails completely): Incorrectly answered an unrelated query, or completely failed to answer a shipping query.
      2 (Poor): Responded to an unrelated query (should have refused), or answered a shipping query with very low quality/incorrect info.
      3 (Partial compliance): Correctly refused but was impolite, or answered a shipping query but with major gaps.
      4 (Good compliance): Correctly handled the query with only minor issues in politeness or completeness.
      5 (Perfect compliance): Flawlessly answered a shipping query, or politely and clearly declined an unrelated query stating its scope.

      ### Target Evaluation:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as a valid JSON object matching this structure:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale for the score assigned>"
      }
